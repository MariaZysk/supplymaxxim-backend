    opening_statement: 'Hello! I''m Agnes, your AI Supply Chain Manager.

      I can help you: - Find substitute ingredients with compliance verification -
      Analyse supplier risk and single-source dependencies - Assess BOM impact of
      any sourcing change - Monitor live regulatory and supply disruption intelligence

      You can also upload a supplier Certificate of Analysis or spec sheet and I will
      extract compliance data and factor it into my recommendations.

      What would you like to explore today? '
    retriever_resource:
      enabled: true
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions:
    - Which ingredients have single-source supplier risk in my portfolio?
    - What verified substitutes exist for vitamin D3 cholecalciferol?
    - Which suppliers can I consolidate across multiple products?
    - What would happen if Prinova USA became unavailable?
    - Are there any active supply disruptions for magnesium stearate?
    - What is the regulatory status of microcrystalline cellulose in the EU?
    suggested_questions_after_answer:
      enabled: true
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
