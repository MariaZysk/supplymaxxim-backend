    - data:
        code: "import json\n\ndef main(body: str) -> dict:\n    try:\n        d =\
          \ json.loads(body)\n    except Exception:\n        return {\"signals_text\"\
          : str(body), \"has_signals\": \"false\"}\n    signals = d.get(\"signals\"\
          , [])\n    headlines = d.get(\"headlines\", [])\n    signal_count = int(d.get(\"\
          signal_count\", 0))\n    note = str(d.get(\"note\", \"\"))\n    if not signals\
          \ and not headlines:\n        text = \"No supply chain disruption signals\
          \ found.\"\n        if note:\n            text += \" (\" + note + \")\"\n\
          \        return {\"signals_text\": text, \"has_signals\": \"false\"}\n \
          \   parts = []\n    if signals:\n        parts.append(\"DISRUPTION SIGNALS\
          \ DETECTED:\")\n        for s in signals:\n            t = s.get(\"type\"\
          , \"unknown\").upper()\n            m = \", \".join(s.get(\"matches\", []))\n\
          \            parts.append(\"  [\" + t + \"] \" + m)\n    if headlines:\n\
          \        parts.append(\"RELEVANT HEADLINES:\")\n        for h in headlines:\n\
          \            parts.append(\"  - \" + str(h))\n    sep = chr(10)\n    return\
          \ {\n        \"signals_text\": sep.join(parts),\n        \"has_signals\"\
          : \"true\" if signal_count > 0 else \"false\"\n    }"
        code_language: python3
        desc: Converts raw /api/news JSON into clean human-readable text for risk_classifier
          and Agnes. Strips slug/from_cache noise. Outputs signals_text and has_signals.
        outputs:
          has_signals:
            children: null
            type: string
          signals_text:
            children: null
            type: string
        selected: false
        title: News Formatter
        type: code
        variables:
        - value_selector:
          - news_query
          - body
          variable: body
