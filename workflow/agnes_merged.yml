      width: 242
    - data:
        context:
          enabled: false
          variable_selector: []
        desc: 'RESTRICTED LLM — classifies pre-formatted disruption signals from news_formatter
          as risk level. Input: clean signal text only. Output: RISK_LEVEL + one sentence.
          Does not generate facts.'
        model:
          completion_params:
            temperature: 0
          mode: chat
          name: gemini-2.5-flash
          provider: langgenius/gemini/google
        prompt_template:
        - id: sys_risk
          role: system
          text: 'You are a supply chain risk classifier. You will receive disruption
            signals extracted from news by a regex parser and formatted as readable
            text — not raw JSON.


            Your ONLY job: classify the overall risk level.


            Output format (exactly two lines, nothing else):

            RISK_LEVEL: HIGH | MEDIUM | LOW | NONE

            REASON: [one sentence referencing only the signals provided, no new facts]


            Risk criteria:

            - HIGH:   active shortage, recall, export ban, or sanctions found

            - MEDIUM: disruption warnings, price spikes, or political tension found

            - LOW:    minor delays or isolated incidents found

            - NONE:   no disruption signals found


            Never mention supplier or ingredient names not present in the input.

            Never invent data not in the signals.

            '
        - id: user_risk
          role: user
          text: 'Disruption signals extracted from news:

            {{#news_formatter.signals_text#}}'
        selected: false
        title: Risk Classifier
        type: llm
        variables: []
        vision:
          enabled: false
      height: 179
