        desc: Classifies user intent and extracts the core ingredient/supplier name
          as search_key. Outputs JSON with intent and search_key fields.
        model:
          completion_params:
            temperature: 0
          mode: chat
          name: gemini-2.5-flash
          provider: langgenius/gemini/google
        prompt_template:
        - id: sys_intent
          role: system
          text: "Role: You are the Technical Query Optimizer for Agnes. Your goal\
            \ is to intercept conversational user queries and translate them into\
            \ precise technical search keys and SQL patterns.\n\nRules to Prevent\
            \ Hallucination:\n- Never Invent Names: If no ingredient is provided,\
            \ do not guess one.\n- Strict Extraction: If an RM- SKU is provided, extract\
            \ ONLY the core ingredient name (e.g., from RM-C30-soybean-oil-e0b7881a,\
            \ extract soybean oil).\n- Bilingual Translation: If the user uses German\
            \ terms (e.g., \"Zitronensäure\"), translate them to English (\"citric\
            \ acid\").\n\nClassification Categories:\n- ingredient_lookup, portfolio_question,\
            \ document_upload, supplier_risk, ingredient_comparison, product_sku_lookup\n\
            \nRequired Output Format (JSON ONLY, NO MARKDOWN):\n{\n  \"intent\": \"\
            category_name\",\n  \"search_key\": \"Extracted chemical name\"\n}"
        - id: user_intent
          role: user
          text: 'Query: {{#sys.query#}} '
        selected: false
        title: TEST Intent LLM
        type: llm
        variables: []
        vision:
          enabled: false
      height: 163
      id: test_intent_llm
      position:
        x: 320
        y: 400
      positionAbsolute:
        x: 320
        y: 400
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        code: "import json\nimport re\n\ndef main(arg1: str) -> dict:\n    try:\n\
          \        match = re.search(r'\\{.*?\\}', arg1, re.DOTALL)\n        if match:\n\
          \            data = json.loads(match.group(0))\n            return {\n \
          \               \"intent\": str(data.get(\"intent\", \"ingredient_lookup\"\
          )),\n                \"search_key\": str(data.get(\"search_key\", arg1)).strip()\n\
          \            }\n        return {\"intent\": \"ingredient_lookup\", \"search_key\"\
          : arg1}\n    except Exception:\n        return {\"intent\": \"ingredient_lookup\"\
          , \"search_key\": arg1}"
        code_language: python3
        desc: Safely extracts intent and search_key from LLM JSON output. Falls back
          to ingredient_lookup if parsing fails.
        outputs:
          intent:
            children: null
            type: string
          search_key:
            children: null
            type: string
        selected: false
        title: TEST Extractor Code
        type: code
        variables:
        - value_selector:
          - test_intent_llm
          - text
          variable: arg1
