            : [],\n  \"allergen_declarations\": [],\n  \"regulatory_standards\": [],\n\
            \  \"supplier_name\": null,\n  \"supplier_contact\": null,\n  \"document_date\"\
            : null,\n  \"notes\": null\n}\n\nDo not infer or hallucinate values.\n"
        - id: user_doc
